{% extends layout %}

{% block title %}Catalog{% endblock %}

{% block page_css %}
<link rel="stylesheet" type="text/css" href="/static/css/form.css">
{% endblock %}

{% block content %}
<h2 class="title">Catalog Rules For {{ orgName }}</h2>

<div class="box">
<form action="/catalog/rules" method="POST">
	<div class="field">
	<div class="control">
		<label for="min-price">Minimum Product Point Cost</label>
		<input id="min-price" name="min-price" type="number" min="0" step="1">
	</div>
	</div>

	<div class="field">
	<div class="control">
		<label for="max-price">Maximum Product Point Cost</label>
		<input id="max-price" name="max-price" type="number" min="0" step="1">
	</div>
	</div>

	<div class="field">
	<div class="control">
		<label for="min-rating">Minimum Product Rating</label>
		<input id="min-rating" name="min-rating" type="number" min="0" max="5" step="0.1">
	</div>
	</div>

	<div class="field">
	<div class="control">
		<label for="keep-all-categories">Keep All Product Categories</label>
		<input id="keep-all-categories" name="keep-all-categories" value="keep-all" type="checkbox">
	</div>
	</div>

	<div class="field">
	<div class="control">
		<label for="keep-all-brands">Keep All Brands</label>
		<input id="keep-all-brands" name="keep-all-brands" value="keep-all" type="checkbox">
	</div>
	</div>
	
	<div class="control">
		<h2 class="title">Allowed Categories...</h2>
