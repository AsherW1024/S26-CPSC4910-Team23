{% extends "activenav.html" %}
{% block title %}My Drivers{% endblock %}
{% block content %}
<div class="container is-max-desktop mt-6">
  <div class="box">
    <div class="level">
      <div class="level-left">
        <h2 class="title is-2">Drivers & Points</h2>
      </div>
      <div class="level-right">
        <a class="button is-info" href="/sponsor/drivers/create">Create Driver</a>
      </div>
    </div>

    <form method="GET" class="mb-4">
      <div class="field has-addons">
        <div class="control is-expanded">
          <input class="input" name="q" value="{{ q }}" placeholder="Search name/username/email">
        </div>
        <div class="control">
          <button class="button is-light">Search</button>
        </div>
      </div>
    </form>

    <table class="table is-fullwidth">
      <thead>
        <tr>
          <th>Name</th><th>Username</th><th>Email</th><th>Points</th><th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for d in drivers %}
        <tr>
          <td>{{ d.Name }}</td>
          <td>{{ d.Username }}</td>
          <td>{{ d.Email }}</td>
          <td>{{ d.TotalPoints }}</td>
          <td>
            <a class="button is-small" href="/organization/users/{{ d.UserID }}/points">Adjust Points</a>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
