{% extends layout %}

{% block title %}Checkout{% endblock %}

{% block page_css %}
<link rel="stylesheet" type="text/css" href="/static/css/form.css">
<link rel="stylesheet" type="text/css" href="/static/css/checkout.css">
{% endblock %}

{% block content %}
<div class="form-container">
	<div class="box">
		<form method="POST" action="/orders/confirm">
			<div class="field">
				<label class="label">Street Address</label>
				<div class="control">
					<input class="input" type="text" name="address" placeholder="Address" value="555 Sesame Street" required>
					<span class="error">
						Please enter a valid address
					</span>
				</div>
			</div>

			<div class="field">
				<label class="label">City</label>
				<div class="control">
					<input class="input" type="text" name="city" placeholder="City Name" value="England" required>
					<span class="error">
						Please enter a valid city
					</span>
				</div>
			</div>

			<div class="field">
				<label class="label">State</label>
				<div class="control">
					<input class="input" type="text" name="state" placeholder="State" value="Ohio" required>
					<span class="error">
						Please enter a valid state
					</span>
				</div>
			</div>

			<button class="button is-block is-info is-large is-fullwidth">Place Order</button>
		</form>
	</div>
</div>
{% endblock %}
