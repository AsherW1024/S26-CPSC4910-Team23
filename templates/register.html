<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/bulma/0.7.2/css/bulma.min.css">
	<title>Register</title>
</head>
<body>
    <div>
        <h3 class="title is-3">Account Registration</h3>
        <h5 class="title is-5">Please fill out the form below.</h5>
    </div>
    <div>
        <div class="box">
            <form method="POST" action="/register">
                <div class="field">
                    <label class="label">Email</label>
                    <div class="control has-icons-left">
                        <input class="input" type="text" placeholder="Email input">
                        <span class="icon is-small is-left">
                            <i class="fas fa-envelope"></i>
                        </span>
                    </div>
                </div>
                <div class="field">
                    <label class="label">Username</label>
                    <div class="control has-icons-left">
                        <input class="input" type="text" placeholder="Username input">
                        <span class="icon is-small is-left">
                            <i class="fas fa-user"></i>
                        </span>
                    </div>
                </div>
                <div class="field">
                    <label class="label">Password</label>
                    <div class="control has-icons-left">
                        <input class="input" type="text" placeholder="Password input">
                    </div>
                </div>
                <div class="field">
                    <label class="label">Name</label>
                    <div class="control">
                        <input class="input" type="text" placeholder="Name input">
                    </div>
                </div>
                <div class="field">
                    <label class="label">Organization</label>
                    <div class="control">
                        <div class="select">
                            <select>
                                <option>No organization</option>
                                <option>Join organization</option>
                                <option>Create an organization</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="field">
                    <label class="label">Organization Name</label>
                    <div class="control">
                        <input class="input" type="text" placeholder="Organization Name input">
                    </div>
                </div>
                <button class="button is-block is-info is-large is-fullwidth">Register</button>
            </form>
        </div>
    </div>
</body>
</html>
