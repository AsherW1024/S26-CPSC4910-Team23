<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/bulma/0.7.2/css/bulma.min.css">
	<title>Login</title>
</head>
<body>
    <div>
        <h2 class="title is-2">Login</h2>
        <h5 class="title is-5">Please fill in your email/username and password.</h5>
    </div>
    <div class="box">
        <form method="POST" action="/login">
            <div class="field">
                <label class="label">Username/Email</label>
                <div class="control has-icons-left">
                    <input class="input" type="text" placeholder="Username/Email input">
                    <span class="icon is-small is-left">
                        <i class="fas fa-user"></i>
                    </span>
                </div>
            </div>
            <div class="field">
                <label class="label">Password</label>
                <div class="control has-icons-left">
                    <input class="input" type="text" placeholder="Password input">
                </div>
            </div>
            <button class="button is-block is-info is-large is-fullwidth">Login</button>
        </form>
    </div>
</body>
</html>
