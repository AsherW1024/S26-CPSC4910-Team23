{% extends layout %}

{% block content %}
<div class="container is-max-desktop mt-6">
  <h1 class="title">Sponsor Profiles</h1>

  <form method="GET" action="/admin/sponsors" class="mb-4">
    <div class="field has-addons">
      <div class="control is-expanded">
        <input class="input" type="text" name="q" placeholder="Search name, email, username, org..." value="{{ q }}">
      </div>
      <div class="control">
        <button class="button is-info" type="submit">Search</button>
      </div>
    </div>
  </form>

  <table class="table is-striped is-fullwidth">
    <thead>
      <tr>
        <th>Name</th><th>Email</th><th>Username</th><th>Org</th><th></th>
      </tr>
    </thead>
    <tbody>
      {% for s in sponsors %}
      <tr>
        <td>{{ s.Name }}</td>
        <td>{{ s.Email }}</td>
        <td>{{ s.Username }}</td>
        <td>{{ s.OrganizationName }}</td>
        <td><a class="button is-small" href="/admin/sponsors/{{ s.UserID }}/edit">Edit</a></td>
      </tr>
      {% endfor %}
      {% if sponsors|length == 0 %}
      <tr><td colspan="5">No sponsors found.</td></tr>
      {% endif %}
    </tbody>
  </table>

  <a class="button" href="/admin/drivers">Go to Drivers</a>
</div>
{% endblock %}
