{% extends layout %}

{% block content %}
<div class="container is-max-desktop mt-6">
  <h1 class="title">User Profiles</h1>

  <form method="GET" action="/{{ accountType }}/users" class="mb-4">
    <div class="field has-addons">
      <div class="control is-expanded">
        <input class="input" type="text" name="q" placeholder="Search name, email, username..." value="{{ q }}">
      </div>
      <div class="control">
        <button class="button is-info" type="submit">Search</button>
      </div>
    </div>
  </form>

  <table class="table is-striped is-fullwidth">
    <thead>
      <tr>
        <th>UserType</th><th>Name</th><th>Email</th><th>Username</th><th></th>
      </tr>
    </thead>
    <tbody>
      {% for u in users %}
      <tr>
        <td>{{ u.UserType }}</td>
        <td>{{ u.Name }}</td>
        <td>{{ u.Email }}</td>
        <td>{{ u.Username }}</td>
        <td><a class="button is-small" href="/{{ accountType }}/users/{{ u.UserID }}/edit">Edit</a></td>
        <td>
          <form method="POST" action="/{{ accountType }}/users/{{ u.UserID }}/delete"
                style="display:inline;" onsubmit="return confirmDelete();">
            <button class="button is-small is-danger" type="submit">
              Delete
            </button>
          </form>
        </td>
      </tr>
      {% endfor %}
      {% if users|length == 0 %}
        <tr><td colspan="5">No users found.</td></tr>
      {% endif %}
    </tbody>
  </table>
</div>
<script src="/static/js/form.js"></script>
{% endblock %}
