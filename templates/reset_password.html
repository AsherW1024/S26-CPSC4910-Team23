<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bulma/0.7.2/css/bulma.min.css">
  <link rel="stylesheet" href="/static/css/form.css">
  <title>Reset Password</title>
</head>
<body>
  <div class="container is-max-desktop mt-6">
    <h2 class="title is-2">Reset Password</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="box">
      <form method="POST" action="/reset_password/{{ token }}">
        <div class="field">
          <label class="label">New Password</label>
          <div class="control">
            <input class="input" type="password" name="new_password" required>
          </div>
          <p class="help">10+ chars, upper/lower/number/special required.</p>
        </div>

        <div class="field">
          <label class="label">Confirm New Password</label>
          <div class="control">
            <input class="input" type="password" name="confirm_new_password" required>
          </div>
        </div>

        <button class="button is-info is-fullwidth">Reset</button>
      </form>
    </div>
  </div>
</body>
</html>
