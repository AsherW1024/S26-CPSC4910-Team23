{% extends layout %}

{% block title %}Profile{% endblock %}

{% block page_css %}
<link rel="stylesheet" type="text/css" href="/static/css/profile.css">
{% endblock %}

{% block content %}
<h1>Profile</h1>
<a href="/profile/edit">
	<button class="button">Edit Profile</button>
</a>
<p>{{ profile.Name }}</p>
<br>
<p>{{ profile.Username }}</p>
<br>
<p>{{ profile.Email }}</p>
<br>
<p>{{ profile.PhoneNumber }}</p>
<br>
<p>end of profile</p>
{% endblock %}
